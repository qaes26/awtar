<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ترددات الروح - نغم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* سواد مطلق وفخم */
            overflow: hidden;
            font-family: 'Amiri', serif;
            color: #ffffff;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية الرسم (الموجة الصوتية) */
        #wave-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        /* الطبقة الأمامية للنصوص */
        #content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* السماح للمس بالمرور للكانفاس */
        }

        /* التلميح في البداية */
        #hint {
            position: absolute;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            top: 40%;
            transition: opacity 1s ease;
            animation: breathe 3s infinite alternate;
        }

        @keyframes breathe {
            0% { opacity: 0.2; transform: translateY(0); }
            100% { opacity: 0.6; transform: translateY(-5px); }
        }

        /* نصوص الرسالة الرومانسية */
        .poem-line {
            position: absolute;
            width: 90%;
            max-width: 800px;
            text-align: center;
            font-size: 2.5rem;
            line-height: 1.6;
            color: #f8f4e6; /* أبيض مائل للذهبي */
            opacity: 0;
            transform: translateY(30px);
            transition: all 2.5s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .poem-line.visible {
            opacity: 1;
            transform: translateY(-80px); /* ترتفع فوق الموجة */
        }

        .poem-line.fade-out {
            opacity: 0;
            transform: translateY(-120px);
            transition: all 2s ease;
        }

        .highlight {
            color: #d4af37; /* لون ذهبي فخم */
            font-weight: bold;
            font-size: 3.5rem;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }

        /* التوقيع */
        .signature {
            position: absolute;
            bottom: 20%;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.2rem;
            color: #d4af37;
            opacity: 0;
            transition: opacity 3s ease;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 20px;
            letter-spacing: 1px;
        }

        .signature.visible {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .poem-line { font-size: 1.8rem; }
            .highlight { font-size: 2.5rem; }
            .poem-line.visible { transform: translateY(-60px); }
        }
    </style>
</head>
<body>

    <canvas id="wave-canvas"></canvas>

    <div id="content-layer">
        <div id="hint">المسي خط الصمت.. لتبدأ الموسيقى</div>
        <!-- النصوص ستُضاف برمجياً هنا -->
        <div class="signature" id="signature">
            بكل حُب،<br>
            من إعداد قيس جازي 🤍
        </div>
    </div>

    <script>
        // --- 1. هندسة الصوت (استعادة صوت البيانو الأول الهادئ والمتدرج) ---
        let audioCtx;
        let isPlaying = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // دالة توليد نوتة بيانو/قيثارة ناعمة
        function playNote(freq, startTime, duration, vol = 0.5) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            // موجة المثلث (Triangle) هي التي أعطت الصوت الأول طابعه الهادئ والصافي
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, startTime);

            // فلتر لتعميق الصوت
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, startTime);
            filter.frequency.exponentialRampToValueAtTime(100, startTime + duration);

            // هندسة صدى النوتة
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(vol, startTime + 0.1); // ضربة ناعمة
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration); // تلاشي طويل

            osc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start(startTime);
            osc.stop(startTime + duration + 1);
        }

        // عزف مقطوعة الأربيجيو (Arpeggio) الأولى
        function playSymphony() {
            initAudio();
            const now = audioCtx.currentTime;
            
            // تتابع الألحان (كما كانت في النسخة الأولى تماماً)
            const notes = [
                { f: 261.63, t: 0 }, { f: 329.63, t: 1 }, { f: 392.00, t: 2 }, { f: 523.25, t: 3 }, // C Major
                { f: 220.00, t: 5 }, { f: 261.63, t: 6 }, { f: 329.63, t: 7 }, { f: 440.00, t: 8 }, // A Minor
                { f: 174.61, t: 10 }, { f: 220.00, t: 11 }, { f: 261.63, t: 12 }, { f: 349.23, t: 13 }, // F Major
                { f: 196.00, t: 15 }, { f: 246.94, t: 16 }, { f: 293.66, t: 17 }, { f: 392.00, t: 18 }  // G Major
            ];

            // عزف التتابع
            notes.forEach(n => {
                playNote(n.f, now + n.t, 5, 0.4);
            });

            // عزف كوردات خلفية (Bass Chords) عميقة للتدعيم
            playNote(130.81, now, 10, 0.3); // C
            playNote(110.00, now + 5, 10, 0.3); // A
            playNote(87.31, now + 10, 10, 0.3); // F
            playNote(98.00, now + 15, 10, 0.3); // G

            // إعادة المقطوعة لتستمر مع الكلمات
            setTimeout(playSymphony, 20000);
        }

        // --- 2. التحكم في رسالة الحب (العرض المسرحي) ---
        const lyrics = [
            "البعض يكتب رسائل الحب بالحبر والورق...",
            "أما أنا، فقد كتبتها باللحن.",
            "لأن اسمكِ ليس مجرد حروف...",
            "إنه <span class='highlight'>نَغَم</span>.",
            "كل تموجٍ في هذا النور هو نبضةٌ من قلبي،",
            "وكل نوتةٍ تسمعينها... تهمسُ لكِ: أحبكِ."
        ];

        const contentLayer = document.getElementById('content-layer');
        const signature = document.getElementById('signature');

        async function showLyrics() {
            for (let i = 0; i < lyrics.length; i++) {
                const line = document.createElement('div');
                line.className = 'poem-line';
                line.innerHTML = lyrics[i];
                contentLayer.appendChild(line);

                // إظهار السطر
                setTimeout(() => line.classList.add('visible'), 100);

                // الانتظار
                let waitTime = i === 3 ? 5000 : 4500; // التركيز أكثر على سطر اسمها
                await new Promise(r => setTimeout(r, waitTime));

                // إخفاء السطر إذا لم يكن الأخير
                if (i < lyrics.length - 1) {
                    line.classList.remove('visible');
                    line.classList.add('fade-out');
                    setTimeout(() => line.remove(), 2000);
                }
            }

            // إظهار التوقيع في النهاية
            setTimeout(() => {
                signature.classList.add('visible');
            }, 1000);
        }

        // --- 3. هندسة الرسم (الموجة الصوتية التفاعلية المتقدمة) ---
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let time = 0;
        let amplitude = 0; // ارتفاع الموجة (يبدأ 0 خط مستقيم)
        let targetAmplitude = 0;
        let mouseX = -1000;
        let mouseY = -1000;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // تتبع الماوس/اللمس للتفاعل مع الموجة
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        canvas.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        canvas.addEventListener('mouseleave', () => { mouseX = -1000; });
        canvas.addEventListener('touchend', () => { mouseX = -1000; });

        function drawWave() {
            ctx.clearRect(0, 0, width, height);

            // انتقال ناعم لحجم الموجة (من خط مستقيم إلى موجة متحركة)
            amplitude += (targetAmplitude - amplitude) * 0.05;

            // رسم 3 موجات متداخلة لتعطي تأثيراً غنياً (كالصوت الحقيقي)
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.lineWidth = i === 0 ? 3 : 1; // الخط المركزي سميك، الأطراف رفيعة
                
                // الألوان: الخط الرئيسي ذهبي ناصع، البقية أطياف ذهبية باهتة
                if (i === 0) {
                    ctx.strokeStyle = `rgba(212, 175, 55, 1)`;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#d4af37'; // توهج ذهبي فخم
                } else {
                    ctx.strokeStyle = `rgba(212, 175, 55, ${0.3 - i*0.1})`;
                    ctx.shadowBlur = 0;
                }

                for (let x = 0; x <= width; x += 2) {
                    // معادلات رياضية (Sine Waves) تتغير مع الوقت
                    let baseFreq = 0.005 + (i * 0.002);
                    let yOffset = Math.sin(x * baseFreq + time + i) * amplitude;
                    
                    // التفاعل مع الماوس (انحناء الموجة عند اقتراب الإصبع)
                    let distToMouse = Math.abs(x - mouseX);
                    if (distToMouse < 200 && isPlaying) {
                        let influence = (200 - distToMouse) / 200;
                        yOffset += Math.sin(time * 5 + x * 0.05) * (50 * influence) * (amplitude/80);
                    }

                    ctx.lineTo(x, (height / 2) + yOffset);
                }
                ctx.stroke();
            }

            time += 0.03;
            requestAnimationFrame(drawWave);
        }
        drawWave();

        // --- 4. بدء التجربة ---
        canvas.addEventListener('click', () => {
            if (isPlaying) return;
            isPlaying = true;

            // إخفاء التلميح
            document.getElementById('hint').style.opacity = '0';
            
            // تحويل الخط الساكن إلى موجة صوتية ضخمة
            targetAmplitude = window.innerHeight * 0.15; // ارتفاع الموجة بناء على الشاشة

            // بدء الموسيقى والكلمات
            playSymphony();
            showLyrics();

            // جعل الموجة تنبض مع الموسيقى بشكل وهمي
            setInterval(() => {
                if(isPlaying) {
                    targetAmplitude = (window.innerHeight * 0.1) + Math.random() * (window.innerHeight * 0.1);
                }
            }, 2000);
        });

    </script>
</body>
</html>
